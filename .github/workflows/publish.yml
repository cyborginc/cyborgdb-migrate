name: Publish to PyPI

# Diverges from cyborgdb-core's publish_py.yaml deliberately:
# core publishes pre-built CPU/CUDA wheels from a separate build workflow
# (it downloads artifacts via `gh run list` + `actions/download-artifact`).
# Migrate is pure Python, so we build the wheel inline with `python -m build`
# inside this workflow. Mirror core only for the workflow_dispatch + tag
# validation + OIDC publish + GitHub release shape.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (must be vX.Y.Z format)'
        required: true
        type: string

permissions:
  id-token: write    # PyPI trusted publishing via OIDC
  contents: write    # creating the GitHub release

jobs:
  smoke:
    name: ChromaDB → cyborgdb-service smoke
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Tag '${{ inputs.tag }}' must be in vX.Y.Z format (e.g., v1.0.0)"
            exit 1
          fi

      - name: Verify tag exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh api "repos/${{ github.repository }}/git/refs/tags/${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "Error: Tag '${{ inputs.tag }}' does not exist in ${{ github.repository }}"
            exit 1
          fi

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compute matching cyborgdb-service tag
        id: service-tag
        run: |
          # Docker Hub publishes cyborginc/cyborgdb-service WITHOUT the leading v
          # (verified against https://hub.docker.com/r/cyborginc/cyborgdb-service/tags).
          # Strip the v: v0.16.3 -> 0.16.3
          tag_no_v="${{ inputs.tag }}"
          tag_no_v="${tag_no_v#v}"
          echo "service_tag=${tag_no_v}" >> $GITHUB_OUTPUT
          echo "Pinning cyborgdb-service to: ${tag_no_v}"

      - name: Install migrate and smoke dependencies
        run: |
          # -c pins the chromadb client to the version matching the
          # chromadb/chroma image in tests/smoke/docker-compose.yml. The wheel's
          # own chromadb range stays loose; this constraint is smoke-test only.
          pip install -c tests/smoke/constraints.txt -e ".[smoke,chromadb]"

      - name: Run smoke test
        env:
          CYBORGDB_SERVICE_TAG: ${{ steps.service-tag.outputs.service_tag }}
        run: |
          pytest tests/smoke/ -v --tb=short

  publish:
    name: Build and publish to PyPI
    needs: smoke
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify pyproject version matches tag
        run: |
          tag_no_v="${{ inputs.tag }}"
          tag_no_v="${tag_no_v#v}"
          pyproject_version=$(grep '^version' pyproject.toml | head -1 | sed -E 's/version *= *"([^"]+)"/\1/')
          if [ "$tag_no_v" != "$pyproject_version" ]; then
            echo "Error: tag '${{ inputs.tag }}' does not match pyproject.toml version '${pyproject_version}'"
            exit 1
          fi

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: false

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
          draft: false
          files: |
            dist/*.whl
            dist/*.tar.gz
