# cyborgdb-migrate configuration example
#
# Environment variables can be referenced as ${VAR_NAME} anywhere.
# Run with: cyborgdb-migrate --config example-config.toml

[source]
type = "pinecone"                    # pinecone | qdrant | weaviate | chromadb | milvus
api_key = "${PINECONE_API_KEY}"
index = "my-source-index"
# namespace = "optional-namespace"   # Pinecone namespaces / Milvus partitions

[destination]
host = "http://localhost:8000"
api_key = "${CYBORGDB_API_KEY}"
index_name = "my-cyborgdb-index"

# --- New index (default) ---
create_index = true
# kms_name = "aws-kms"               # Use a KMS-wrapped key instead of a generated one
# embedding_model = "text-embedding-3-small"
# storage_precision = "fp16"         # fp32 (default) | fp16

# --- Existing index (uncomment to use) ---
# create_index = false
# index_key = "hex-encoded-key-here" # Required for non-KMS indexes
# key_file = "/path/to/keyfile"      # Alternative to index_key
# kms_name = "aws-kms"               # For KMS-backed indexes, no key needed

[options]
batch_size = 200                     # Vectors per batch (default: 100)
checkpoint_every = 10                # Save checkpoint every N batches
spot_check_per_batch = 4             # Samples per batch for verification
